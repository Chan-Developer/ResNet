services:
  mysql:
    image: mysql:8.0
    container_name: plantcare-mysql
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3307:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uplantcare", "-pplantcare_123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - plantcare_mysql_data:/var/lib/mysql

volumes:
  plantcare_mysql_data:
